version: '3.8'

services:
  downtown:
    build: .
    container_name: downtown-bars
    ports:
      - "5000:5000"
    volumes:
      - downtown-data:/data
    environment:
      - SECRET_KEY=change-this-to-something-secure
      - MANAGER_PASSWORD=downtown2026
    restart: unless-stopped

volumes:
  downtown-data:
