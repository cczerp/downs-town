# render.yaml — Deploy Downtown to Render
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: down-town
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MANAGER_PASSWORD
        value: downtown2026   # ← change this before deploying!
    disk:
      name: bar-data
      mountPath: /data
      sizeGB: 1
